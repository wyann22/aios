<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760" role="img" aria-labelledby="title desc">
  <title id="title">残差路径融合前后的算子拓扑</title>
  <desc id="desc">左侧为 Add 和 RMSNorm 两个 kernel，右侧为 fused_add_rmsnorm 一个原地 kernel。</desc>
  <defs>
    <marker id="arrow-red" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0,0 L10,5 L0,10z" fill="#dc2626"/></marker>
    <marker id="arrow-blue" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0,0 L10,5 L0,10z" fill="#1e3a5f"/></marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0,0 L10,5 L0,10z" fill="#047857"/></marker>
    <style>
      text { font-family: "Noto Sans CJK SC", "Microsoft YaHei", sans-serif; fill: #374151; }
      .title { font-size: 30px; font-weight: 700; fill: #1e40af; }
      .subtitle { font-size: 17px; fill: #64748b; }
      .heading { font-size: 23px; font-weight: 700; }
      .small { font-size: 14px; }
      .node { stroke-width: 2.5; rx: 12; }
      .panel { stroke-width: 2.5; rx: 18; }
      .edge { fill: none; stroke-width: 2.5; }
      .code { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 14px; fill: #22c55e; }
    </style>
  </defs>

  <text x="640" y="42" text-anchor="middle" class="title">残差路径融合：从两个算子节点收敛为一个原地更新节点</text>
  <text x="640" y="75" text-anchor="middle" class="subtitle">x 是 attention / MLP 的输出；residual 是跨子层持续保存的累加状态。</text>

  <rect x="35" y="110" width="570" height="555" class="panel" fill="#fff7f7" stroke="#dc2626"/>
  <text x="320" y="145" text-anchor="middle" class="heading" fill="#991b1b">融合前：Add 与 RMSNorm 是两个 kernel</text>
  <text x="320" y="173" text-anchor="middle" class="small" fill="#b45309">sum 写回 / 再读入，发生 2 次 kernel launch</text>

  <rect x="75" y="240" width="145" height="62" class="node" fill="#fed7aa" stroke="#c2410c"/>
  <text x="147" y="266" text-anchor="middle">residual</text><text x="147" y="286" text-anchor="middle" class="small">(上一子层)</text>
  <rect x="75" y="380" width="145" height="62" class="node" fill="#fed7aa" stroke="#c2410c"/>
  <text x="147" y="406" text-anchor="middle">x</text><text x="147" y="426" text-anchor="middle" class="small">(当前子层输出)</text>
  <rect x="300" y="310" width="130" height="74" class="node" fill="#fef3c7" stroke="#b45309"/>
  <text x="365" y="338" text-anchor="middle">kernel #1</text><text x="365" y="362" text-anchor="middle">Add</text>
  <path d="M220 271 L300 335" class="edge" stroke="#c2410c" marker-end="url(#arrow-red)"/>
  <path d="M220 411 L300 359" class="edge" stroke="#c2410c" marker-end="url(#arrow-red)"/>

  <rect x="475" y="317" width="92" height="60" class="node" fill="#fee2e2" stroke="#dc2626"/>
  <text x="521" y="342" text-anchor="middle">sum</text><text x="521" y="362" text-anchor="middle" class="small">r + x</text>
  <path d="M430 347 L475 347" class="edge" stroke="#b45309" marker-end="url(#arrow-red)"/>
  <text x="521" y="407" text-anchor="middle" class="small" fill="#b91c1c">临时张量写回 HBM</text>

  <rect x="290" y="492" width="140" height="74" class="node" fill="#dbeafe" stroke="#1e3a5f"/>
  <text x="360" y="520" text-anchor="middle">kernel #2</text><text x="360" y="544" text-anchor="middle">RMSNorm</text>
  <path d="M520 377 L520 435 L360 435 L360 492" class="edge" stroke="#dc2626" marker-end="url(#arrow-red)"/>
  <text x="436" y="427" text-anchor="middle" class="small" fill="#b91c1c">从 HBM 再读</text>
  <rect x="470" y="499" width="98" height="60" class="node" fill="#a7f3d0" stroke="#047857"/>
  <text x="519" y="524" text-anchor="middle">x_norm</text><text x="519" y="544" text-anchor="middle" class="small">(送入下层)</text>
  <path d="M430 529 L470 529" class="edge" stroke="#1e3a5f" marker-end="url(#arrow-blue)"/>
  <rect x="75" y="510" width="145" height="58" class="node" fill="#a7f3d0" stroke="#047857"/>
  <text x="147" y="535" text-anchor="middle">residual = sum</text><text x="147" y="555" text-anchor="middle" class="small">(下一子层)</text>
  <path d="M490 377 L490 465 L147 465 L147 510" class="edge" stroke="#dc2626" marker-end="url(#arrow-red)"/>
  <rect x="75" y="600" width="470" height="46" class="node" fill="#1e293b" stroke="#1e3a5f"/>
  <text x="310" y="628" text-anchor="middle" class="code">sum = residual + x   →   x = rmsnorm(sum)</text>

  <rect x="675" y="110" width="570" height="555" class="panel" fill="#f0fdf4" stroke="#047857"/>
  <text x="960" y="145" text-anchor="middle" class="heading" fill="#047857">融合后：一个原地 fused_add_rmsnorm kernel</text>
  <text x="960" y="173" text-anchor="middle" class="small" fill="#047857">同一 kernel 完成累加和归一化；sum 不落回 HBM</text>

  <rect x="715" y="260" width="145" height="62" class="node" fill="#fed7aa" stroke="#c2410c"/>
  <text x="787" y="286" text-anchor="middle">residual</text><text x="787" y="306" text-anchor="middle" class="small">(原缓冲区)</text>
  <rect x="715" y="400" width="145" height="62" class="node" fill="#fed7aa" stroke="#c2410c"/>
  <text x="787" y="426" text-anchor="middle">x</text><text x="787" y="446" text-anchor="middle" class="small">(当前子层输出)</text>
  <rect x="940" y="315" width="190" height="120" class="node" fill="#ddd6fe" stroke="#6d28d9"/>
  <text x="1035" y="344" text-anchor="middle">kernel #1</text><text x="1035" y="369" text-anchor="middle">fused_add_rmsnorm</text><text x="1035" y="400" text-anchor="middle" class="small">add + RMSNorm</text>
  <path d="M860 291 L940 360" class="edge" stroke="#c2410c" marker-end="url(#arrow-red)"/>
  <path d="M860 431 L940 392" class="edge" stroke="#c2410c" marker-end="url(#arrow-red)"/>
  <text x="1035" y="462" text-anchor="middle" class="small" fill="#6d28d9">sum 留在 SRAM / 寄存器</text>

  <rect x="1120" y="246" width="105" height="60" class="node" fill="#a7f3d0" stroke="#047857"/>
  <text x="1172" y="271" text-anchor="middle">x_norm</text><text x="1172" y="291" text-anchor="middle" class="small">(送入下层)</text>
  <path d="M1130 354 L1172 306" class="edge" stroke="#047857" marker-end="url(#arrow-green)"/>
  <rect x="1120" y="475" width="105" height="60" class="node" fill="#a7f3d0" stroke="#047857"/>
  <text x="1172" y="500" text-anchor="middle">residual</text><text x="1172" y="520" text-anchor="middle" class="small">(原地更新)</text>
  <path d="M1130 400 L1172 475" class="edge" stroke="#047857" marker-end="url(#arrow-green)"/>
  <rect x="715" y="575" width="480" height="72" class="node" fill="#1e293b" stroke="#1e3a5f"/>
  <text x="735" y="603" class="code">fused_add_rmsnorm(x, residual)</text>
  <text x="735" y="628" class="code"># residual += x; x = rmsnorm(residual)</text>

  <text x="320" y="710" text-anchor="middle" font-size="18" fill="#991b1b">未融合：2 个拓扑节点 · 1 个 sum 临时张量</text>
  <text x="960" y="710" text-anchor="middle" font-size="18" fill="#047857">融合后：1 个拓扑节点 · residual 原地更新</text>
</svg>
